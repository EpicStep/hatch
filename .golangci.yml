version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  enable:
    - goheader
    - misspell
    - nilnil
    - paralleltest
    - revive
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      enable-all-rules: true
      rules:
        - name: add-constant
          disabled: true
        - name: var-naming
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: function-length
          disabled: true
        - name: cognitive-complexity
          arguments: [30]
        - name: cyclomatic
          disabled: true
        - name: import-alias-naming
          disabled: true
        - name: unused-receiver
          disabled: true
        - name: nested-structs
          disabled: true
        - name: package-comments
          disabled: true
        - name: unhandled-error
          arguments: ["fmt.Fprint", "fmt.Println", "fmt.Fprintln", "fmt.Fprintf"]

formatters:
  enable:
    - goimports
    - gofmt
  settings:
    goimports:
      local-prefixes:
        - github.com/EpicStep/hatch
